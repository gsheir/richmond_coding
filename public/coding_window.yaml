# Coding window configuration for Richmond Hockey Club

# Button definitions
buttons:
  # Phase buttons - attacking
  - code: "OUTLET"
    label: "Outlet"
    type: "phase"
    hotkey: "O"
    position:
      x: 10
      y: 80
      width: 120
      height: 60
    style:
      colour: "#2D5F8D"  # Blue for attacking phases
      opacity: 0.9
      font_size: 14
      font_weight: "bold"
    lead_ms: 3000
    lag_ms: 5000

  - code: "HIGH_TRANSFER"
    label: "High Transfer"
